    checkOut: $checkOut,
    pax: $pax,
    status: $status,
    totalPrice: $totalPrice,
    netPrice: $netPrice,
    agenciaName: $agenciaName,
    tipo: $tipo,
    servicios: $servicios,
    variaciones: $variaciones,
    pasajeros: $pasajeros,
    telefono: $telefono,
    email: $email,
    flightNo: $flightNo,
    specialRequests: $specialRequests,
    mercado: $mercado,
    createdAt: $createdAt,
    comprobanteRef: $comprobanteRef,
    comprobanteMonto: $comprobanteMonto,
    comprobanteMetodo: $comprobanteMetodo,
    facturacionTipo: $facturacionTipo,
    facturacionRechazoMotivo: $facturacionRechazoMotivo,
    facturacionRechazoArchivos: $facturacionRechazoArchivos,
    canalVenta: $canalVenta,
    clienteDirectoId: $clienteDirectoId,
    localizadorProveedor: $localizadorProveedor
